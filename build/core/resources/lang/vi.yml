      list:
        description: Hiển thị danh sách lệnh.
      enable:
        description: Bật một lệnh.
        options:
          command: Lệnh để bật.
      disable:
        description: Tắt một lệnh.
        options:
          command: Lệnh để tắt.
      permission:
        description: Quản lý quyền lệnh.
        subcommands:
          set:
            description: Đặt quyền cho lệnh.
            options:
              command: Lệnh để đặt quyền.
              permission: Quyền để đặt.
          remove:
            description: Xóa quyền của lệnh.
            options:
              command: Lệnh để xóa quyền.

no-permission: Bạn không có quyền để sử dụng điều này.

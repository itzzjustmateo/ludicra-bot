    description: Quản lý siêu dữ liệu.
    subcommands:
      set:
        description: Đặt siêu dữ liệu.
      remove:
        description: Xóa siêu dữ liệu.
      add:
        description: Thêm siêu dữ liệu.
      subtract:
        description: Trừ một giá trị khỏi siêu dữ liệu.
      toggle:
        description: Chuyển đổi siêu dữ liệu boolean.
      list-add:
        description: Thêm một giá trị vào siêu dữ liệu kiểu danh sách.
      list-remove:
        description: Xóa một giá trị khỏi siêu dữ liệu kiểu danh sách.

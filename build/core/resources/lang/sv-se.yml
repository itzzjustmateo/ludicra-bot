  remove: Metadatan `[[meta_key]]` har tagits bort.
  add: Metadatan `[[meta_key]]` har lagts till med värdet `[[meta_value]]`.
  subtract: Värdet för metadatan `[[meta_key]]` har minskats med `[[meta_value]]`.
  toggle: "Metadatan `[[meta_key]]` har satts till `[[meta_value]]`. "

command:
  not-found: Kommandot `[[command]]` hittades inte.
  enabled: Kommandot `[[command]]` har aktiverats.
  disabled: Kommandot `[[command]]` har inaktiverats.
  permission:
    set: Behörigheten för kommandot `[[command]]` har uppdaterats.
    remove: Behörigheten för kommandot `[[command]]` har tagits bort.
    unknown: Ogiltigt behörighetsvärde.


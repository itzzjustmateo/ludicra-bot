commands:
  addons:
    description: Hantera tillägg.
    subcommands:
      list:
        description: Visa listan över tillägg.
      enable:
        description: Aktivera ett tillägg.
        options:
          addon: Tillägget som ska aktiveras.
      disable:
        description: Inaktivera ett tillägg.
        options:
          addon: Tillägget som ska inaktiveras.
  reload:
    description: Starta om boten
  parse:
    description: Parsa en text.
    options:
      text: Texten som ska parsas.
      user: Användaren att parsa texten för.
  leaderboard:
    description: Visa topplistan.
  meta:
    description: Hantera metadata.
    subcommands:
      set:
        description: Sätt metadata.
      remove:
        description: Ta bort metadata.
      add:
        description: Lägg till metadata.
      subtract:
        description: Subtrahera ett värde från metadata.
      toggle:
        description: Växla boolesk metadata.
      list-add:
        description: Lägg till ett värde i listmetadata.
      list-remove:
        description: Ta bort ett värde från listmetadata.
    options:
      key: Nyckeln för metadatan.
      value: Värdet för metadatan.
      scope: ID:t för kanalen eller användaren som metadatan ska sättas för.
  commands:
    description: Hantera botkommandon.
    subcommands:
      list:
        description: Visa listan över kommandon.
      enable:
        description: Aktivera ett kommando.
        options:
          command: Kommandot som ska aktiveras.
      disable:
        description: Inaktivera ett kommando.
        options:
          command: Kommandot som ska inaktiveras.
      permission:
        description: Hantera kommandobehörigheter.
        subcommands:
          set:
            description: Sätt kommandobehörighet.
            options:
              command: Kommandot som behörigheten ska sättas för.
              permission: Behörigheten som ska sättas.
          remove:
            description: Ta bort kommandobehörighet.
            options:
              command: Kommandot som behörigheten ska tas bort från.

no-permission: Du har inte behörighet att använda det.
in-cooldown: Du är för närvarande på cooldown. Du kan utföra denna åtgärd igen [[cooldown]].
only-in-primary-guild: Denna åtgärd kan endast användas i den primära guilden.
invalid-time: "Ogiltigt tidsformat. Vänligen använd ett giltigt tidsformat. Exempel: 1d, 1h, 1m, 1s."

pagination:
  select-placeholder: Sida [[pagination_current_page]]/[[pagination_total_pages]]
  placeholder: Välj ett alternativ
  no-items: Inga värden att visa.
  filter-placeholder: Välj ett filter
  next-page: Nästa
  previous-page: Föregående

leaderboard:
  title: "### 🏆 Topplista – [[leaderboard_name]]"

  entry: "`[[position]].` [[user_mention]] • [[value]]"
  value:
    messages: "**[[value]]** skickade meddelanden"

addons:
  title: Nedan finns listan över tillgängliga tillägg.
  info: |
    ### [[addon_status]] [[addon_name]] v[[addon_version]]
    Författare: [[addon_authors]]
  website: Webbplats
  enabled: Tillägget `[[addon_name]]` har aktiverats. Starta om boten för att tillämpa ändringarna.
  disabled: Tillägget `[[addon_name]]` har inaktiverats. Starta om boten för att tillämpa ändringarna.
  already-enabled: Tillägget `[[addon_name]]` är redan aktiverat.
  already-disabled: Tillägget `[[addon_name]]` är redan inaktiverat.
  not-found: Tillägget `[[addon_name]]` finns inte.
reloaded: Boten har startats om. Det kan ta några sekunder att distribuera kommandon.
error-reloading: |
  ### Fel vid omstart av boten
  Ett fel uppstod vid omstart av boten.
  ```
  [[error_message]]
  ```  
parsed: |
  Parsar texten för [[target_mention]]:

  ```
  [[parsed_text]]
  ```
engine:
  missing-argument: Skriptet `[[script]]` saknar argumentet `[[missing]]`.
  missing-context: "Skriptet `[[script]]` saknar kontexten `[[missing]]`. "

meta:
